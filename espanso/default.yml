# espanso configuration file

# This is the default configuration file, change it as you like it
# You can refer to the official documentation:
# https://espanso.org/docs/

# Matches are the substitution rules, when you type the "trigger" string
# it gets replaced by the "replace" string.
matches:
  # Simple text replacement
  - trigger: "-m"
    replace: "- Marco"

  - trigger: "-grme"
    replace: |
      Kind regards
      - Marco Pas

  - trigger: "-grmn"
    replace: |
      Met vriendelijke groet
      - Marco Pas

  - trigger: "gpas"
    replace: "marco.pasopas@gmail.com"

  - trigger: "ppas"
    replace: "marco.pas@philips.com"

  - trigger: ":1on1"
    replace: "Please find attached our 1-on-1 meeting notes for date: {{mydate}}"
    vars:
    - name: mydate
      type: date
      params:
        format: "%Y-%m-%d %a"

  # Dates
  - trigger: ":date"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%a %d-%b-%Y"
  - trigger: ":tstamp"
    replace: "{{mytstamp}}"
    vars:
      - name: mytstamp
        type: date
        params:
          format: "%Y-%m-%d - %H:%M"

  # Shell commands
  - trigger: ":shell"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "echo Hello from your shell"
