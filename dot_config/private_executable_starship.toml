# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$kubernetes\
$conda\
$python\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
${custom.jj}\
${custom.git_branch}\
${custom.git_commit}\
${custom.git_status}\
$cmd_duration\
$fill\
$docker_context\
$aws\
$line_break\
$character
"""

# Inserts a blank line between shell prompts
add_newline = false

[line_break]
disabled = false

[aws]
format = '[$symbol($profile )(\($region\) )]($style)'
style = 'bold blue'
symbol = '🅰 '

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[conda]
format = "[$symbol$environment]($style) "

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[directory]
style = "blue"

[docker_context]
disabled = false
format = 'via [🐋 $context](blue bold)'

[fill]
symbol = ' '
style = 'bold green'

[kubernetes]
disabled = true
# detect_files = ['k8s']
format = 'on [⛵ ($user on )($cluster in )$context \($namespace\)](dimmed green) '
contexts = [
    { context_pattern = "dev.local.cluster.k8s", style = "green", symbol = "💔 " },
]

[python]
pyenv_version_name = false
python_binary = ['./venv/bin/python', 'python', 'python3', 'python2']

# # custom module for jj status
[custom.jj]
description = "The current jj status"
when = "jj --ignore-working-copy root"
symbol = "󱗆 "
command = '''
jj log --revisions @ --no-graph --ignore-working-copy --color always --limit 1 --template '
  separate(" ",
    change_id.shortest(4),
    bookmarks,
    "",
    concat(
      if(conflict, "✘"),
      if(divergent, "⥮"),
      if(hidden, "󰊠"),
      if(immutable, "󰌾"),
    ),
    raw_escape_sequence("\x1b[1;32m") ++ if(empty, ""),
    raw_escape_sequence("\x1b[1;32m") ++ coalesce(
      truncate_end(29, description.first_line(), "…"),
      "",
    ) ++ raw_escape_sequence("\x1b[0m"),
  )
'
'''

# optionally disable git modules when JJ is found.
# note that you'll need to add ${custom.git_branch}, ${custom.git_commit} etc
# into format: https://starship.rs/config/#default-prompt-format
[git_status]
disabled = true

[custom.git_status]
when = "! jj --ignore-working-copy root"
command = "starship module git_status"
style = "" # This disables the default "(bold green)" style
description = "Only show git_status if we're not in a jj repo"

[git_commit]
disabled = true

[custom.git_commit]
when = "! jj --ignore-working-copy root"
command = "starship module git_commit"
style = ""
description = "Only show git_commit if we're not in a jj repo"

[git_metrics]
disabled = true

[custom.git_metrics]
when = "! jj --ignore-working-copy root"
command = "starship module git_metrics"
description = "Only show git_metrics if we're not in a jj repo"
style = ""

[git_branch]
disabled = true

[custom.git_branch]
when = "! jj --ignore-working-copy root"
command = "starship module git_branch"
description = "Only show git_branch if we're not in a jj repo"
style = ""

